replicaCount: 1
image:
  imagePolicy: enabled
  repository: devkrolikowski/swiss-army-knife
  tag: 0.3.0 # {"$imagepolicy": "flux-system:helper:tag"}
resources:
  limits:
    memory: "1024Mi"
    cpu: "2"
  requests:
    memory: "1024Mi"
    cpu: "1"
ingress:
  enabled: false
startupProbes:
  enabled: false
volumes:
  enabled: true
  mountPath: 
    - storage:/storage
  type:
    nfs:
      server: lab-storage.lan
      path: /volume1/storagelab
config:
  enabled: true
  configMaps:
    - name: config
      mode: 644
    - name: sasl-password
      mode: 600
  configMounts:
    - smtp-config:/etc/postfix
    - smtp-sasl-password:/etc/postfix